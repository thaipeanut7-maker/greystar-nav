<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Greystar</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Helvetica Neue',sans-serif;-webkit-font-smoothing:antialiased;background:#000;color:#fff;user-select:none;}
.wallpaper{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 10%,#1a2a6c,transparent 60%),radial-gradient(ellipse 60% 70% at 80% 20%,#0a4a7c,transparent 55%),radial-gradient(ellipse 70% 50% at 50% 80%,#0d1f3c,transparent 60%),linear-gradient(160deg,#0f0c29 0%,#0a1628 40%,#0d2137 70%,#0f1c2d 100%);}
.screen{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;}
.status-bar{display:flex;justify-content:space-between;align-items:center;padding:14px 22px 4px;flex-shrink:0;}
.status-time{font-size:17px;font-weight:700;}
.sync-dot{width:8px;height:8px;border-radius:50%;cursor:pointer;transition:background .4s;}
.sync-dot.idle{background:rgba(255,255,255,0.18);}
.sync-dot.saving{background:#FF9F0A;animation:pulse .8s infinite;}
.sync-dot.saved{background:#30D158;}
.sync-dot.error{background:#FF453A;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.home-title{padding:2px 22px 10px;font-size:34px;font-weight:700;letter-spacing:-0.5px;flex-shrink:0;}
.home-sub{font-size:13px;font-weight:400;opacity:0.45;margin-top:1px;}
.search-bar{margin:0 18px 14px;position:relative;flex-shrink:0;}
.search-bar input{width:100%;height:38px;background:rgba(255,255,255,0.13);border:none;border-radius:12px;padding:0 14px 0 36px;font-family:inherit;font-size:15px;color:rgba(255,255,255,0.9);outline:none;transition:background .2s;}
.search-bar input::placeholder{color:rgba(255,255,255,0.38);}
.search-bar input:focus{background:rgba(255,255,255,0.19);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:15px;height:15px;opacity:0.4;pointer-events:none;}
.filter-strip{display:flex;gap:12px;padding:0 18px 14px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
.filter-strip::-webkit-scrollbar{display:none;}
.f-app{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex-shrink:0;}
.f-app:active .f-icon{transform:scale(0.87);opacity:0.7;}
.f-icon{width:58px;height:58px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:27px;transition:transform .12s,opacity .12s;position:relative;box-shadow:0 4px 14px rgba(0,0,0,0.4);}
.f-icon.period{background:linear-gradient(145deg,#1d6fa4,#007AFF);}
.f-icon.acct{background:linear-gradient(145deg,#2e8b57,#34C759);}
.f-icon.client{background:linear-gradient(145deg,#7a3baf,#AF52DE);}
.f-icon.clear{background:linear-gradient(145deg,#444,#636366);}
.f-badge{position:absolute;top:-5px;right:-5px;min-width:18px;height:18px;padding:0 4px;background:#FF3B30;border-radius:9px;font-size:11px;font-weight:700;color:white;display:flex;align-items:center;justify-content:center;border:2px solid #000;opacity:0;transform:scale(0);transition:opacity .15s,transform .15s;}
.f-badge.on{opacity:1;transform:scale(1);}
.f-label{font-size:11px;font-weight:500;color:rgba(255,255,255,0.65);text-align:center;max-width:68px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.f-label.on{color:#fff;font-weight:600;}
.count{padding:0 22px 8px;font-size:13px;color:rgba(255,255,255,0.38);flex-shrink:0;}
.grid-wrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 14px 30px;scrollbar-width:none;}
.grid-wrap::-webkit-scrollbar{display:none;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px 4px;}
@media(min-width:480px){.grid{grid-template-columns:repeat(5,1fr);}}
@media(min-width:640px){.grid{grid-template-columns:repeat(6,1fr);}}
@media(min-width:800px){.grid{grid-template-columns:repeat(7,1fr);}}
@media(min-width:960px){.grid{grid-template-columns:repeat(8,1fr);}}
@media(min-width:1120px){.grid{grid-template-columns:repeat(9,1fr);}}
.app{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:6px 2px;border-radius:18px;transition:background .15s;animation:fadeUp .28s ease both;}
.app:active{background:rgba(255,255,255,0.09);}
.app-icon{width:64px;height:64px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;letter-spacing:0.2px;color:white;text-shadow:0 1px 2px rgba(0,0,0,0.4);box-shadow:0 3px 10px rgba(0,0,0,0.4),0 0 0 0.5px rgba(255,255,255,0.07) inset;transition:transform .12s;position:relative;overflow:hidden;flex-shrink:0;font-family:'SF Mono','Menlo','Cascadia Code',monospace;text-transform:lowercase;line-height:1.1;text-align:center;padding:2px;}
.app-icon::after{content:'';position:absolute;top:0;left:0;right:0;height:50%;background:linear-gradient(180deg,rgba(255,255,255,0.16),transparent);pointer-events:none;}
.app:active .app-icon{transform:scale(0.86);}
.app-name{font-size:11px;font-weight:500;color:rgba(255,255,255,0.8);text-align:center;line-height:1.3;max-width:72px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.empty-grid{grid-column:1/-1;text-align:center;padding:60px 20px;color:rgba(255,255,255,0.3);}
.empty-grid div:first-child{font-size:44px;margin-bottom:10px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.overlay{position:fixed;inset:0;z-index:50;background:transparent;pointer-events:none;transition:background .28s;}
.overlay.open{background:rgba(0,0,0,0.55);pointer-events:auto;backdrop-filter:blur(5px);-webkit-backdrop-filter:blur(5px);}
.sheet{position:absolute;bottom:0;left:0;right:0;background:rgba(26,26,32,0.96);backdrop-filter:saturate(200%) blur(30px);-webkit-backdrop-filter:saturate(200%) blur(30px);border-radius:22px 22px 0 0;padding:10px 20px 48px;transform:translateY(100%);transition:transform .36s cubic-bezier(0.32,0.72,0,1);max-height:88vh;overflow-y:auto;scrollbar-width:none;}
.sheet::-webkit-scrollbar{display:none;}
.overlay.open .sheet{transform:translateY(0);}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.2);margin:0 auto 18px;}
.ps-name{font-size:26px;font-weight:700;letter-spacing:-0.4px;line-height:1.2;}
.ps-code{font-size:13px;color:rgba(255,255,255,0.4);font-family:'SF Mono','Menlo',monospace;margin-top:4px;}
.ps-chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;margin-bottom:20px;}
.chip{font-size:12px;font-weight:600;padding:4px 12px;border-radius:100px;}
.chip-client{background:rgba(255,255,255,0.09);color:rgba(255,255,255,0.75);}
.chip-acct{background:rgba(175,82,222,0.18);color:#bf7af0;}
.chip-role-owner{background:rgba(52,199,89,0.15);color:#4cd964;}
.chip-role-member{background:rgba(88,86,214,0.15);color:#7b79f2;}
.folders-label{font-size:13px;font-weight:600;color:rgba(255,255,255,0.38);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;}
.folder-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.folder-btn{display:flex;align-items:center;gap:12px;background:rgba(255,255,255,0.06);border-radius:16px;padding:15px;text-decoration:none;color:white;transition:background .15s,transform .12s;border:none;cursor:pointer;font-family:inherit;}
.folder-btn:hover{background:rgba(255,255,255,0.1);}
.folder-btn:active{transform:scale(0.96);}
.folder-btn.disabled{opacity:0.28;pointer-events:none;}
.fi{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;box-shadow:0 2px 8px rgba(0,0,0,0.35);}
.fi.acct{background:linear-gradient(145deg,#1d6fa4,#007AFF);}
.fi.ame{background:linear-gradient(145deg,#2e8b57,#34C759);}
.fi.mor{background:linear-gradient(145deg,#b36000,#FF9500);}
.fi.gen{background:linear-gradient(145deg,#7a3baf,#AF52DE);}
.fb-name{font-size:15px;font-weight:600;}
.fb-sub{font-size:12px;color:rgba(255,255,255,0.42);margin-top:1px;}
.ps-actions{margin-top:25px;display:flex;gap:8px;}
.btn-edit{flex:1;height:48px;background:rgba(255,255,255,0.1);border:none;border-radius:14px;color:white;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-delete{flex:1;height:48px;background:rgba(255,59,48,0.2);border:1px solid rgba(255,59,48,0.3);border-radius:14px;color:#FF453A;font-weight:600;cursor:pointer;font-family:inherit;}
.btn-edit:active,.btn-delete:active{opacity:0.6;}
.edit-form{display:flex;flex-direction:column;gap:15px;}
.edit-group{display:flex;flex-direction:column;gap:6px;}
.edit-group label{font-size:12px;color:rgba(255,255,255,0.4);margin-left:4px;}
.edit-group input{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:12px;color:white;font-size:16px;outline:none;font-family:inherit;}
.edit-group input:focus{border-color:rgba(255,255,255,0.3);}
.fs-title{font-size:22px;font-weight:700;margin-bottom:16px;}
.fo-list{display:flex;flex-direction:column;gap:1px;}
.fo{display:flex;justify-content:space-between;align-items:center;padding:14px 2px;border-bottom:.5px solid rgba(255,255,255,0.07);cursor:pointer;font-size:16px;transition:opacity .15s;}
.fo:last-child{border-bottom:none;}
.fo:active{opacity:0.6;}
.fo-check{width:22px;height:22px;border-radius:11px;border:1.5px solid rgba(255,255,255,0.18);display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.fo.sel .fo-check{background:#007AFF;border-color:#007AFF;}
.fo.sel .fo-check::after{content:'✓';font-size:13px;font-weight:700;color:white;}
.done-btn{width:100%;height:52px;margin-top:18px;background:#007AFF;border:none;border-radius:14px;color:white;font-family:inherit;font-size:17px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.done-btn:active{opacity:0.75;}
.year-row{display:flex;gap:8px;margin-bottom:12px;}
.yr-btn{flex:1;height:42px;background:rgba(255,255,255,0.07);border:none;border-radius:12px;color:rgba(255,255,255,0.65);font-family:inherit;font-size:15px;font-weight:500;cursor:pointer;transition:all .15s;}
.yr-btn.sel{background:#007AFF;color:white;}
.yr-btn:active{opacity:0.7;}
.mo-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:8px;}
.mo-btn{background:rgba(255,255,255,0.07);border:none;border-radius:12px;padding:11px 6px;color:rgba(255,255,255,0.7);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;text-align:center;}
.mo-btn.sel{background:#007AFF;color:white;}
.mo-btn:active{opacity:0.7;}
.csv-zone{margin-top:12px;border:2px dashed rgba(255,255,255,0.15);border-radius:14px;padding:24px 16px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;}
.csv-zone:hover,.csv-zone.drag{border-color:rgba(0,122,255,0.5);background:rgba(0,122,255,0.06);}
.csv-zone-label{font-size:14px;color:rgba(255,255,255,0.5);margin-top:6px;}
.csv-zone input{display:none;}
.csv-preview{margin-top:14px;max-height:200px;overflow-y:auto;scrollbar-width:none;font-size:13px;color:rgba(255,255,255,0.7);}
.csv-preview::-webkit-scrollbar{display:none;}
.csv-row{display:flex;justify-content:space-between;padding:6px 4px;border-bottom:0.5px solid rgba(255,255,255,0.06);}
.csv-row span:first-child{font-weight:600;color:white;}
.color-list{display:flex;flex-direction:column;gap:1px;margin-top:8px;}
.color-row{display:flex;align-items:center;gap:10px;padding:12px 4px;border-bottom:0.5px solid rgba(255,255,255,0.07);cursor:pointer;transition:opacity .15s;}
.color-row:active{opacity:0.6;}
.color-row:last-child{border-bottom:none;}
.color-swatch{width:32px;height:32px;border-radius:8px;flex-shrink:0;box-shadow:0 1px 4px rgba(0,0,0,0.3);}
.color-name{font-size:15px;flex:1;color:rgba(255,255,255,0.85);}
.color-count{font-size:12px;color:rgba(255,255,255,0.35);}
.color-input{flex:1;height:40px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.1);border-radius:10px;padding:0 12px;color:white;font-size:14px;font-family:inherit;outline:none;}
.color-input:focus{border-color:rgba(255,255,255,0.3);}
.color-picker-wrap{width:40px;height:40px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,0.15);flex-shrink:0;cursor:pointer;}
.color-picker-wrap input[type=color]{width:56px;height:56px;border:none;margin:-8px;cursor:pointer;}
.add-btn-float{position:fixed;bottom:30px;right:24px;z-index:40;width:56px;height:56px;border-radius:28px;background:#007AFF;border:none;color:white;font-size:28px;font-weight:300;box-shadow:0 4px 16px rgba(0,122,255,0.45);cursor:pointer;transition:transform .12s,box-shadow .15s;display:flex;align-items:center;justify-content:center;}
.add-btn-float:active{transform:scale(0.9);}
.add-btn-float:hover{box-shadow:0 6px 24px rgba(0,122,255,0.55);}
.tab-bar{display:flex;background:rgba(255,255,255,0.08);border-radius:10px;padding:2px;margin-bottom:18px;}
.tab-btn{flex:1;height:34px;border:none;border-radius:8px;background:transparent;color:rgba(255,255,255,0.5);font-family:inherit;font-size:14px;font-weight:500;cursor:pointer;transition:all .15s;}
.tab-btn.active{background:rgba(255,255,255,0.15);color:white;}
.reset-btn{width:100%;height:44px;margin-top:10px;background:rgba(255,59,48,0.12);border:1px solid rgba(255,59,48,0.2);border-radius:12px;color:#FF453A;font-family:inherit;font-size:14px;font-weight:600;cursor:pointer;}
.reset-btn:active{opacity:0.6;}
</style>
</head>
<body>
<div class="wallpaper"></div>
<div class="screen">
  <div class="status-bar">
    <div class="status-time" id="clock">9:41</div>
    <div class="sync-dot idle" id="syncDot" title="Synced" onclick="cloudLoad()"></div>
  </div>
  <div class="home-title">Greystar<div class="home-sub">Property Navigator</div></div>
  <div class="search-bar">
    <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="white" stroke-width="2"><circle cx="8.5" cy="8.5" r="5.5"/><path d="M13 13l4 4" stroke-linecap="round"/></svg>
    <input type="text" id="search" placeholder="Search properties, clients…" oninput="render()">
  </div>
  <div class="filter-strip">
    <div class="f-app" onclick="openPeriodSheet()">
      <div class="f-icon period"><div class="f-badge on" id="periodBadge">·</div>📅</div>
      <div class="f-label on" id="periodLabel">Period</div>
    </div>
    <div class="f-app" onclick="openFilterSheet('accountant')">
      <div class="f-icon acct">👤<div class="f-badge" id="acctBadge"></div></div>
      <div class="f-label" id="acctLabel">Accountant</div>
    </div>
    <div class="f-app" onclick="openFilterSheet('client')">
      <div class="f-icon client">🏢<div class="f-badge" id="clientBadge"></div></div>
      <div class="f-label" id="clientLabel">Client</div>
    </div>
    <div class="f-app" onclick="clearAll()">
      <div class="f-icon clear">✕</div>
      <div class="f-label">Clear</div>
    </div>
    <div class="f-app" onclick="openColorsSheet()">
      <div class="f-icon" style="background:linear-gradient(145deg,#c44,#FF6B6B)">🎨</div>
      <div class="f-label">Colors</div>
    </div>
    <div class="f-app" onclick="openHiddenSheet()">
      <div class="f-icon" style="background:linear-gradient(145deg,#3a3a3c,#636366)">👁️<div class="f-badge" id="hiddenBadge"></div></div>
      <div class="f-label" id="hiddenLabel">Hidden</div>
    </div>
  </div>
  <div class="count" id="count"></div>
  <div class="grid-wrap"><div class="grid" id="grid"></div></div>
</div>

<button class="add-btn-float" onclick="openAddSheet()" title="Add Properties">+</button>

<div class="overlay" id="overlay" onclick="maybeClose(event)">
  <div class="sheet" id="sheet" onclick="event.stopPropagation()">
    <div class="sheet-handle"></div>
    <div id="sheetBody"></div>
  </div>
</div>

var JBIN_BASE = 'https://api.jsonbin.io/v3';
var JBIN_KEY = '$2a$10$SFLOk7jf20NPRGW.wZpeQ.7O' + '/rPN3nDfLFNecyb1SsHZmtBRrt19W';
var BIN_ID = localStorage.getItem('greystar_bin_id') || '';

function setSyncStatus(s) {
  var el = document.getElementById('syncDot');
  if (!el) return;
  el.className = 'sync-dot ' + s;
  var titles = {idle:'Synced (click to refresh)',saving:'Saving…',saved:'Saved ✓',error:'Sync error — saved locally'};
  el.title = titles[s] || '';
  if (s === 'saved') setTimeout(function(){ setSyncStatus('idle'); }, 2500);
}

function cloudLoad() {
  setSyncStatus('saving');
  if (!BIN_ID) {
    // First run — create bin
    fetch(JBIN_BASE + '/b', {
      method: 'POST',
      headers: {'Content-Type':'application/json','X-Master-Key':JBIN_KEY,'X-Bin-Name':'GreystarNav','X-Bin-Private':'true'},
      body: JSON.stringify({properties:PROPERTIES, colors:CLIENT_COLORS_HEX, hidden:HIDDEN_CODES})
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      BIN_ID = d.metadata.id;
      localStorage.setItem('greystar_bin_id', BIN_ID);
      setSyncStatus('saved');
      render();
    })
    .catch(function(e){ console.warn('cloudLoad create failed:', e); setSyncStatus('error'); render(); });
  } else {
    fetch(JBIN_BASE + '/b/' + BIN_ID + '/latest', {
      headers: {'X-Master-Key': JBIN_KEY}
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      PROPERTIES = d.record.properties || INITIAL_PROPERTIES.slice();
      CLIENT_COLORS_HEX = d.record.colors || JSON.parse(JSON.stringify(DEFAULT_CLIENT_COLORS));
      HIDDEN_CODES = d.record.hidden || [];
      setSyncStatus('saved');
      render();
    })
    .catch(function(e){ console.warn('cloudLoad read failed:', e); setSyncStatus('error'); render(); });
  }
}

function cloudSave() {
  localStorage.setItem('greystar_props', JSON.stringify(PROPERTIES));
  localStorage.setItem('greystar_colors', JSON.stringify(CLIENT_COLORS_HEX));
  localStorage.setItem('greystar_hidden', JSON.stringify(HIDDEN_CODES));
  if (!BIN_ID) { cloudLoad(); return; }
  setSyncStatus('saving');
  fetch(JBIN_BASE + '/b/' + BIN_ID, {
    method: 'PUT',
    headers: {'Content-Type':'application/json','X-Master-Key':JBIN_KEY},
    body: JSON.stringify({properties:PROPERTIES, colors:CLIENT_COLORS_HEX, hidden:HIDDEN_CODES})
  })
  .then(function(){ setSyncStatus('saved'); })
  .catch(function(e){ console.warn('cloudSave failed:', e); setSyncStatus('error'); });
}

function saveToStorage(){ clearTimeout(syncTimer); syncTimer = setTimeout(cloudSave, 800); }

function grad(client) {
  var hex = CLIENT_COLORS_HEX[client];
  if (!hex) return 'linear-gradient(145deg,#3a3a3c,' + DEFAULT_COLOR + ')';
  var r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  var dk = '#' + Math.max(0,r-60).toString(16).padStart(2,'0') + Math.max(0,g-60).toString(16).padStart(2,'0') + Math.max(0,b-60).toString(16).padStart(2,'0');
  return 'linear-gradient(145deg,' + dk + ',' + hex + ')';
}

function urls(p) {
  var SP = 'https://greystar365.sharepoint.com/sites';
  var m = MONTHS.find(function(x){ return x.n === ST.month; });
  var mf = ST.month + '-' + m.l;
  var y = String(ST.year);
  function spUrl(site, path){ return SP + '/' + site + '/Shared%20Documents/Forms/AllItems.aspx?id=' + encodeURIComponent(path).replace(/%2F/g,'%2F'); }
  return {
    accounting: spUrl('Prop-'+p.slug+'-'+p.code+'-Accounting', '/sites/Prop-'+p.slug+'-'+p.code+'-Accounting/Shared Documents/Accounting/'+y+'/'+mf),
    ame:        spUrl('Prop-'+p.slug+'-'+p.code+'-AccountingMonthEnd', '/sites/Prop-'+p.slug+'-'+p.code+'-AccountingMonthEnd/Shared Documents/Accounting Month End/'+y+'/'+mf),
    mor:        spUrl('Prop-'+p.slug+'-'+p.code+'-MonthlyOperationsReportMOR', '/sites/Prop-'+p.slug+'-'+p.code+'-MonthlyOperationsReportMOR/Shared Documents/Monthly Operations Report (MOR)/'+y+'/'+mf),
    general:    p.teamsUrl || null
  };
}

// ── 6. RENDER ────────────────────────────────────────────────────────
function render() {
  var q = document.getElementById('search').value.toLowerCase().trim();
  var filtered = PROPERTIES.filter(function(p) {
    if (HIDDEN_CODES.indexOf(p.code) >= 0) return false;
    if (q && p.name.toLowerCase().indexOf(q) < 0 && p.code.indexOf(q) < 0 && (p.client||'').toLowerCase().indexOf(q) < 0) return false;
    if (ST.accountants.length && ST.accountants.indexOf(p.accountant) < 0) return false;
    if (ST.clients.length && ST.clients.indexOf(p.client) < 0) return false;
    return true;
  });

  var hiddenCount = PROPERTIES.filter(function(p){ return HIDDEN_CODES.indexOf(p.code) >= 0; }).length;
  document.getElementById('count').textContent = filtered.length + ' of ' + PROPERTIES.length + ' properties' + (hiddenCount ? ' · ' + hiddenCount + ' hidden' : '');

  var mObj = MONTHS.find(function(x){ return x.n === ST.month; });
  document.getElementById('periodLabel').textContent = mObj.l.slice(0,3) + ' ' + ST.year;

  var acctOn = ST.accountants.length > 0;
  document.getElementById('acctLabel').textContent = acctOn ? (ST.accountants.length===1 ? ST.accountants[0].split(' ')[0] : ST.accountants.length+' Accts') : 'Accountant';
  document.getElementById('acctLabel').classList.toggle('on', acctOn);
  document.getElementById('acctBadge').textContent = acctOn ? ST.accountants.length : '';
  document.getElementById('acctBadge').classList.toggle('on', acctOn);

  var clientOn = ST.clients.length > 0;
  document.getElementById('clientLabel').textContent = clientOn ? (ST.clients.length===1 ? ST.clients[0].split(' ')[0] : ST.clients.length+' Clients') : 'Client';
  document.getElementById('clientLabel').classList.toggle('on', clientOn);
  document.getElementById('clientBadge').textContent = clientOn ? ST.clients.length : '';
  document.getElementById('clientBadge').classList.toggle('on', clientOn);

  document.getElementById('hiddenBadge').textContent = hiddenCount || '';
  document.getElementById('hiddenBadge').classList.toggle('on', hiddenCount > 0);
  document.getElementById('hiddenLabel').classList.toggle('on', hiddenCount > 0);

  var grid = document.getElementById('grid');
  if (!filtered.length) { grid.innerHTML = '<div class="empty-grid"><div>🔍</div><div style="font-size:15px;margin-top:4px">No matches</div></div>'; return; }

  grid.innerHTML = filtered.map(function(p, i) {
    var realIdx = PROPERTIES.indexOf(p);
    return '<div class="app" style="animation-delay:' + Math.min(i*.014,.4) + 's"' +
      ' onclick="openProp(' + realIdx + ')"' +
      ' oncontextmenu="event.preventDefault();toggleHide(\'' + p.code + '\')"' +
      ' data-code="' + p.code + '" id="prop-' + p.code + '">' +
      '<div class="app-icon" style="background:' + grad(p.client) + '">' + p.code + '</div>' +
      '<div class="app-name">' + p.name + '</div></div>';
  }).join('');
  addLongPressListeners();
}

function toggleHide(code) {
  var idx = HIDDEN_CODES.indexOf(code);
  if (idx >= 0) {
    HIDDEN_CODES.splice(idx,1); saveHidden(); render();
  } else {
    HIDDEN_CODES.push(code); saveHidden();
    var el = document.getElementById('prop-'+code);
    if (el) { el.style.transition='opacity .25s,transform .25s'; el.style.opacity='0'; el.style.transform='scale(0.7)'; }
    setTimeout(function(){ render(); }, 260);
  }
}

function addLongPressListeners() {
  document.querySelectorAll('.app[data-code]').forEach(function(el) {

      lpTimer = setTimeout(function(){ if(navigator.vibrate)navigator.vibrate(40); toggleHide(el.dataset.code); }, 600);
    }, {passive:true});
    el.addEventListener('touchend',  function(){ clearTimeout(lpTimer); }, {passive:true});
    el.addEventListener('touchmove', function(){ clearTimeout(lpTimer); }, {passive:true});
  });
}

function closeSheet() { document.getElementById('overlay').classList.remove('open'); }
function maybeClose(e){ if(e.target===document.getElementById('overlay')) closeSheet(); }

// ── 12. ADD PROPERTY ─────────────────────────────────────────────────
function openAddSheet() { addTab='manual'; csvParsed=[]; renderAddSheet(); openSheet(); }

function renderAddSheet() {
  var manualForm =
    '<div class="edit-form">' +
      '<div class="edit-group"><label>Property Name *</label><input type="text" id="addName" placeholder="e.g. Broadstone Trailside"></div>' +
      '<div class="edit-group"><label>Property Code *</label><input type="text" id="addCode" placeholder="e.g. rpbrotra"></div>' +
      '<div class="edit-group"><label>Client</label><input type="text" id="addClient" placeholder="e.g. TA Realty"></div>' +
      '<div class="edit-group"><label>Accountant</label><input type="text" id="addAcct" placeholder="e.g. Gaby Sosa"></div>' +
      '<div class="edit-group"><label>Role</label><input type="text" id="addRole" value="Owner" placeholder="Owner or Member"></div>' +
    '</div><button class="done-btn" onclick="addManual()">Add Property</button>';
  var csvForm =
    '<div class="csv-zone" id="csvZone" onclick="document.getElementById(\'csvFile\').click()" ondragover="event.preventDefault();this.classList.add(\'drag\')" ondragleave="this.classList.remove(\'drag\')" ondrop="event.preventDefault();this.classList.remove(\'drag\');handleCSV(event.dataTransfer.files[0])">' +
      '<div style="font-size:36px;opacity:0.5">📄</div>' +
      '<div class="csv-zone-label">Tap to upload or drag a CSV</div>' +
      '<div style="font-size:11px;color:rgba(255,255,255,0.3);margin-top:6px">Columns: name, code, client, accountant, role</div>' +
      '<input type="file" id="csvFile" accept=".csv,.tsv,.txt" onchange="handleCSV(this.files[0])">' +
    '</div>' +
    '<div class="csv-preview" id="csvPreview"></div>' +
    '<button class="done-btn" id="csvImportBtn" style="opacity:0.4;pointer-events:none" onclick="importCSV()">Import 0 Properties</button>';
  document.getElementById('sheetBody').innerHTML =
    '<div class="fs-title">Add Properties</div>' +
    '<div class="tab-bar">' +
      '<button class="tab-btn '+(addTab==='manual'?'active':'')+'" onclick="addTab=\'manual\';renderAddSheet()">Manual</button>' +
      '<button class="tab-btn '+(addTab==='csv'?'active':'')+'" onclick="addTab=\'csv\';renderAddSheet()">CSV Upload</button>' +
    '</div>' + (addTab==='manual' ? manualForm : csvForm);
}

function addManual() {
  var name = document.getElementById('addName').value.trim();
  var code = document.getElementById('addCode').value.trim().toLowerCase();
  if (!name||!code) return alert('Name and Code are required');
  if (PROPERTIES.some(function(p){return p.code===code;})) return alert('Code "'+code+'" already exists');
  var cl = document.getElementById('addClient').value.trim();
  if (cl && !CLIENT_COLORS_HEX[cl]) CLIENT_COLORS_HEX[cl] = 'hsl('+Math.floor(Math.random()*360)+',65%,55%)';
  PROPERTIES.push({name:name, slug:name.replace(/[^a-zA-Z0-9]/g,''), code:code, role:document.getElementById('addRole').value.trim()||'Owner', client:cl, accountant:document.getElementById('addAcct').value.trim(), teamsUrl:''});
  saveToStorage(); closeSheet(); render();
}

function handleCSV(file) {
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var lines = e.target.result.split(/\r?\n/).filter(function(l){return l.trim();});
    if (lines.length<2) { alert('CSV needs a header row + data'); return; }
    var sep = lines[0].indexOf('\t')>=0 ? '\t' : ',';
    var hdr = lines[0].split(sep).map(function(h){return h.trim().toLowerCase().replace(/['"]/g,'');});
    var nameIdx=hdr.indexOf('name'); if(nameIdx<0)nameIdx=hdr.indexOf('property');
    var codeIdx=hdr.indexOf('code'); if(codeIdx<0)codeIdx=hdr.indexOf('property code');
    var clientIdx=hdr.indexOf('client'); var acctIdx=hdr.indexOf('accountant'); var roleIdx=hdr.indexOf('role');
    if (nameIdx<0||codeIdx<0) { alert('CSV must have "name" and "code" columns'); return; }
    csvParsed=[];
    var existing={};PROPERTIES.forEach(function(p){existing[p.code]=1;});
    for (var i=1;i<lines.length;i++) {
      var cols=lines[i].split(sep).map(function(c){return c.trim().replace(/^["']|["']$/g,'');});
      var code=(cols[codeIdx]||'').toLowerCase();
      if (!code||!cols[nameIdx]||existing[code]) continue;
      csvParsed.push({name:cols[nameIdx],code:code,slug:cols[nameIdx].replace(/[^a-zA-Z0-9]/g,''),client:clientIdx>=0?(cols[clientIdx]||''):'',accountant:acctIdx>=0?(cols[acctIdx]||''):'',role:roleIdx>=0?(cols[roleIdx]||'Owner'):'Owner',teamsUrl:''});
    }
    var prev=document.getElementById('csvPreview');
    prev.innerHTML=csvParsed.length ? csvParsed.map(function(p){return '<div class="csv-row"><span>'+p.name+'</span><span style="opacity:0.5">'+p.code+'</span></div>';}).join('') : '<div style="padding:12px;text-align:center;color:rgba(255,255,255,0.4)">No new properties found</div>';
    var btn=document.getElementById('csvImportBtn');
    btn.textContent='Import '+csvParsed.length+' Properties';
    btn.style.opacity=csvParsed.length?'1':'0.4';
    btn.style.pointerEvents=csvParsed.length?'auto':'none';
  };
  reader.readAsText(file);
}

function importCSV() {
  if (!csvParsed.length) return;
  csvParsed.forEach(function(p){ if(p.client&&!CLIENT_COLORS_HEX[p.client]) CLIENT_COLORS_HEX[p.client]='hsl('+Math.floor(Math.random()*360)+',65%,55%)'; });
  PROPERTIES.push.apply(PROPERTIES, csvParsed);
  saveToStorage(); closeSheet(); render();
  setTimeout(function(){ alert('Imported '+csvParsed.length+' properties'); }, 300);
}

// ── 13. COLORS SHEET ─────────────────────────────────────────────────
function openColorsSheet() {
  var clientMap={};
  PROPERTIES.forEach(function(p){if(p.client)clientMap[p.client]=(clientMap[p.client]||0)+1;});
  Object.keys(CLIENT_COLORS_HEX).forEach(function(c){if(!clientMap[c])clientMap[c]=0;});
  var all=Object.keys(clientMap).sort();
  document.getElementById('sheetBody').innerHTML =
    '<div class="fs-title">Client Colors</div>' +
    '<div style="font-size:13px;color:rgba(255,255,255,0.35);margin-bottom:12px">Tap a client to change its color</div>' +
    '<div class="color-list">' +
    all.map(function(c){ return '<div class="color-row" onclick="editColor(\''+c.replace(/'/g,"\\'")+'\')"><div class="color-swatch" style="background:'+(CLIENT_COLORS_HEX[c]||DEFAULT_COLOR)+'"></div><div class="color-name">'+c+'</div><div class="color-count">'+(clientMap[c]||0)+'</div></div>'; }).join('') +
    '</div>' +
    '<div style="margin-top:16px;padding-top:12px;border-top:0.5px solid rgba(255,255,255,0.08)"><div style="font-size:13px;color:rgba(255,255,255,0.35);margin-bottom:8px">Unassigned</div><div class="color-row" style="cursor:default"><div class="color-swatch" style="background:'+DEFAULT_COLOR+'"></div><div class="color-name" style="opacity:0.5">No client</div><div class="color-count">'+PROPERTIES.filter(function(p){return !p.client;}).length+'</div></div></div>' +
    '<button class="reset-btn" onclick="resetColors()">Reset All Colors</button>' +
    '<button class="done-btn" onclick="closeSheet()">Done</button>';
  openSheet();
}

function editColor(client) {
  var curHex = CLIENT_COLORS_HEX[client] || DEFAULT_COLOR;
  var sample = PROPERTIES.find(function(p){return p.client===client;});
  document.getElementById('sheetBody').innerHTML =
    '<div class="fs-title">'+client+'</div>' +
    '<div style="font-size:13px;color:rgba(255,255,255,0.35);margin-bottom:16px">'+PROPERTIES.filter(function(p){return p.client===client;}).length+' properties</div>' +
    '<div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">' +
      '<div class="color-picker-wrap"><input type="color" id="colorPick" value="'+(curHex.startsWith('#')?curHex:'#636366')+'" onchange="previewColor(this.value)"></div>' +
      '<input class="color-input" type="text" id="colorHex" value="'+curHex+'" placeholder="#FF0000" oninput="previewColor(this.value)">' +
    '</div>' +
    '<div style="display:flex;align-items:center;gap:10px;margin-bottom:20px;"><div style="font-size:13px;color:rgba(255,255,255,0.4)">Preview:</div><div class="app-icon" id="colorPreview" style="background:'+grad(client)+';width:48px;height:48px;border-radius:12px;font-size:9px">'+(sample?sample.code:'test')+'</div></div>' +
    '<button class="done-btn" onclick="saveColor(\''+client.replace(/'/g,"\\'")+'\')">Save Color</button>' +
    '<button class="btn-edit" style="margin-top:10px;background:transparent;border:none;width:100%" onclick="openColorsSheet()">← Back</button>';
  openSheet();
}

function previewColor(val) { var el=document.getElementById('colorPreview'); if(el) el.style.background='linear-gradient(145deg,rgba(0,0,0,0.25),transparent),'+val; }

function saveColor(client) {
  var val=document.getElementById('colorHex').value.trim();
  if(!val)return;
  CLIENT_COLORS_HEX[client]=val; saveColors(); render(); openColorsSheet();
}

function resetColors() {
  if(!confirm('Reset all client colors to defaults?'))return;
  CLIENT_COLORS_HEX=JSON.parse(JSON.stringify(DEFAULT_CLIENT_COLORS)); saveColors(); render(); openColorsSheet();
}

// ── 14. BOOT ─────────────────────────────────────────────────────────
render();
cloudLoad();
</script>
</body>
</html>
